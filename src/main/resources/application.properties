spring.application.name=hardwareHub
server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/hardware_hub
spring.datasource.username=root
spring.datasource.password=root

# JWT Access Token - expiracion en segundos (15 minutos)
app.jwt.access-expiration=900

# JWT Refresh Token - expiracion en segundos (7 dias)
app.jwt.refresh-expiration=604800

# Configuracion de cookies
app.cookie.secure=false
app.cookie.same-site=Strict

# Logging
logging.config=classpath:log4j2.xml


# Springdoc / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger

# GNews API
gnews.api.key=b359ca988e31651a854f1ea7299cdf35
gnews.api.base-url=https://gnews.io/api/v4/top-headlines
gnews.api.category=technology
gnews.api.lang=es

